<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="kairos-devs.cu — Transformamos tu caos en orden digital">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0A0A0A"/>
      <stop offset="100%" stop-color="#1A1A2E"/>
    </linearGradient>
    <linearGradient id="brand" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00D4FF"/>
      <stop offset="50%" stop-color="#635BFF"/>
      <stop offset="100%" stop-color="#FF6B6B"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="rgba(0,212,255,0.18)"/>
      <stop offset="100%" stop-color="rgba(0,212,255,0)"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Decorative grid lines (subtle) -->
  <g opacity="0.08" stroke="#FFFFFF" stroke-width="1">
    <line x1="0" y1="100" x2="1200" y2="100"/>
    <line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="300" x2="1200" y2="300"/>
    <line x1="0" y1="400" x2="1200" y2="400"/>
    <line x1="0" y1="500" x2="1200" y2="500"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>

  <!-- Brand wordmark -->
  <text x="600" y="245"
        font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif"
        font-size="76" font-weight="800"
        text-anchor="middle"
        fill="url(#brand)"
        letter-spacing="-2">kairos-devs.cu</text>

  <!-- Tagline -->
  <text x="600" y="335"
        font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif"
        font-size="40" font-weight="300"
        text-anchor="middle"
        fill="#F5F5F7">Transformamos tu caos en orden digital</text>

  <!-- Subtitle / value prop -->
  <text x="600" y="400"
        font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif"
        font-size="22" font-weight="400"
        text-anchor="middle"
        fill="#9CA3AF"
        letter-spacing="2">AUTOMATIZACIONES  ·  APPS A MEDIDA  ·  E-COMMERCE  ·  IA</text>

  <!-- Decorative line -->
  <line x1="350" y1="450" x2="850" y2="450" stroke="url(#brand)" stroke-width="2" opacity="0.6"/>

  <!-- Footer pills -->
  <g font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif" font-size="20" font-weight="600">
    <rect x="370" y="490" width="160" height="42" rx="21"
          fill="rgba(255,255,255,0.05)" stroke="rgba(0,212,255,0.4)" stroke-width="1"/>
    <text x="450" y="517" text-anchor="middle" fill="#00D4FF">Cuba 🇨🇺</text>

    <rect x="540" y="490" width="200" height="42" rx="21"
          fill="rgba(255,255,255,0.05)" stroke="rgba(99,91,255,0.4)" stroke-width="1"/>
    <text x="640" y="517" text-anchor="middle" fill="#635BFF">Diagnóstico gratis</text>

    <rect x="750" y="490" width="160" height="42" rx="21"
          fill="rgba(255,255,255,0.05)" stroke="rgba(255,107,107,0.4)" stroke-width="1"/>
    <text x="830" y="517" text-anchor="middle" fill="#FF6B6B">&lt;24h respuesta</text>
  </g>
</svg>